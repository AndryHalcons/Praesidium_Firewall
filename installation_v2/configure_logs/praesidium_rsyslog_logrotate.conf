/var/log/syslog
/var/log/mail.log
/var/log/kern.log
/var/log/auth.log
/var/log/user.log
/var/log/cron.log
/var/log/daemon.log
/var/log/debug
/var/log/messages
{
    daily
    rotate 7
    maxsize 100M
    missingok
    su syslog adm
    notifempty
    compress
    delaycompress
    sharedscripts
    create 640 syslog adm
    postrotate
        /usr/lib/rsyslog/rsyslog-rotate
    endscript
}
